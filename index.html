  <body translate="no" class="notranslate">
    <div id="root"></div>
    <script>
      // Forçar unregistration do Service Worker para evitar cache de PWA durante manutenção
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
            console.log('Service Worker removido para atualização');
          }
        });
      }

      let lastHash = null;

      async function checkForUpdates() {
        try {
          // Busca o index.html com timestamp para ignorar cache de rede
          const response = await fetch('/?t=' + Date.now(), { cache: 'no-store' });
          const text = await response.text();
          
          // Criar um hash simples do conteúdo (ou tamanho)
          const currentHash = text.length;

          if (lastHash !== null && currentHash !== lastHash) {
            console.log("Mudança detectada! Recarregando...");
            window.location.reload(true);
          }
          lastHash = currentHash;
        } catch (e) {
          console.error("Erro no auto-reload:", e);
        }
      }

      // Verifica a cada 60 segundos para evitar sobrecarga no servidor
      setInterval(checkForUpdates, 60000);
      checkForUpdates(); // Executa a primeira vez
    </script>
